<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ant Desktop</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="index.js"></script>
  </head>
  <body>
    <header class="titlebar"></header>
    <main>
      <h1>Ant Desktop</h1>
      <p>This page is rendered by Chromium.</p>
      <section>
        <div class="status">
          <span class="dot"></span>
          <strong id="version"></strong>
        </div>
        <p id="details"></p>
        <button id="toggle-theme">Toggle theme</button>
      </section>
    </main>
  </body>
</html>
